services:
  proxy:
    build: .
    ports:
      - "127.0.0.1:8181:8080"
      - "${TAILSCALE_IP}:8182:8090"
    env_file:
      - .env
    volumes:
      - ./tokens.yaml:/app/tokens.yaml:ro
      - ./virtual_keys.yaml:/app/virtual_keys.yaml:ro
      - ./usage_stats.json:/app/usage_stats.json
    logging:
      options:
        max-size: "10m"
        max-file: "1"
